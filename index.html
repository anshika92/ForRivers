<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgotten Rivers</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- STICKY MAP (GLOBAL) -->
<div id="map-stage">
  <img id="map-image" src="images/maps/map0.jpg" alt="Map background" />
</div>
  
<!-- HERO as a step-->
<header class="hero step active"
  data-map="map0.jpg"
  data-zoon="1">
  <h1>Forgotten Rivers</h1>
  <p>They still flow.</p>
</header>

<!-- STORY -->
<main id="story">

  <section class="step" data-map="map1.jpg">
    <p>
      Once, rivers shaped where cities grew.
    </p>
  </section>

  <section class="step" data-map="map2.jpg">
    <p>
      We built over them<br />
      and stopped seeing them.
    </p>
  </section>

  <section class="step" data-map="map3.jpg">
    <p>
      They still carry our rain, our runoff,<br />
     and sadly much more.
    </p>
  </section>

    <section class="step" data-map="map3.jpg">
    <p>
      Where does rain go?
    </p>

    <img
      src="images/Raindrops.gif"
      alt="raindrops"
      class="inline-image"
      />
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
